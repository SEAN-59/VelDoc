name: Deploy VelDoc

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/sean-59/veldoc
  NAS_APP_DIR: ${{ vars.NAS_APP_DIR || '/volume1/veldoc' }}
  NAS_PORT: ${{ secrets.NAS_PORT || '64' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eu
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main

      - name: Resolve image tag
        id: image
        run: |
          set -eu
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
          else
            VERSION_TAG="manual-${GITHUB_SHA::7}"
          fi
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Validate NAS settings
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_SSH_PRIVATE_KEY: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
        run: |
          set -eu
          test -n "$NAS_HOST" || { echo "NAS_HOST secret is required."; exit 1; }
          test -n "$NAS_USER" || { echo "NAS_USER secret is required."; exit 1; }
          test -n "$NAS_SSH_PRIVATE_KEY" || { echo "NAS_SSH_PRIVATE_KEY secret is required."; exit 1; }

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:${{ steps.image.outputs.version_tag }}" .

      - name: Push image
        run: |
          set -eu
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${{ steps.image.outputs.version_tag }}"

      - name: Prepare SSH
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_SSH_PRIVATE_KEY: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
        run: |
          set -eu
          test -n "$NAS_HOST"
          test -n "$NAS_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$NAS_SSH_PRIVATE_KEY" > ~/.ssh/veldoc_nas
          chmod 600 ~/.ssh/veldoc_nas
          ssh-keyscan -p "$NAS_PORT" "$NAS_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose file
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
        run: |
          set -eu
          test -n "$NAS_USER"
          ssh -i ~/.ssh/veldoc_nas -p "$NAS_PORT" "$NAS_USER@$NAS_HOST" "mkdir -p '$NAS_APP_DIR/docs'"
          scp -i ~/.ssh/veldoc_nas -P "$NAS_PORT" docker-compose.yml "$NAS_USER@$NAS_HOST:$NAS_APP_DIR/docker-compose.yml"

      - name: Run on NAS
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -eu
          GHCR_TOKEN_B64="$(printf '%s' "$GHCR_TOKEN" | base64 | tr -d '\n')"
          ssh -i ~/.ssh/veldoc_nas -p "$NAS_PORT" "$NAS_USER@$NAS_HOST" \
            "NAS_APP_DIR='$NAS_APP_DIR' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN_B64='$GHCR_TOKEN_B64' sh -s" <<'REMOTE'
          set -eu

          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN_B64" ]; then
            printf '%s' "$GHCR_TOKEN_B64" | base64 -d | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          cd "$NAS_APP_DIR"

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose is not installed on NAS."
            exit 1
          fi

          $COMPOSE pull
          $COMPOSE up -d --remove-orphans
          docker image prune -f
          REMOTE
